[env]
term = "alacritty"

[general]
live_config_reload = true

[window]
opacity = 1.0

[font]
size = 11.0

[font.normal]
family = "DejaVuSansM Nerd Font"

[colors.primary]
background = "#1e2528"
foreground = "#f9e2af"

[colors.normal]
black   = "#2c3235"
red     = "#ff87a8"
green   = "#8acfd1"
yellow  = "#00ff00"
blue    = "#ff8a66"
magenta = "#ff0000"
cyan    = "#fcbf3b"
white   = "#0000ff"

[colors.bright]
black   = "#2c3235"
red     = "#ff87a8"
green   = "#8acfd1"
yellow  = "#00ff00"
blue    = "#ff8a66"
magenta = "#ff0000"
cyan    = "#fcbf3b"
white   = "#0000ff"

[colors.selection]
text       = "#000000"
background = "#E8B4B8"

[colors.search.matches]
foreground = "#FDFCF9"
background = "#D85A5A"

[colors.search.focused_match]
foreground = "#000000"
background = "#FF8A95"

[colors.cursor]
text   = "#000000"
cursor = "#FF8A95"    # bright sakura pink – impossible to miss

[colors.line_indicator]
background = "#FFE6E8"   # subtle sakura-tinted current line

[cursor]
style.shape = "Underline"
style.blinking = "Off"
thickness = 0.2
