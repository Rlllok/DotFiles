[env]
term = "alacritty"

[general]
live_config_reload = true

[window]
padding.x = 10
padding.y = 10
opacity = 1.0
startup_mode = "Maximized"
decorations = "Buttonless"

[font]
size = 12.0

[font.normal]
family = "DejaVuSansM Nerd Font"

[colors.primary]
background = "#1c2124"
foreground = "#dcdccc"

[colors.normal]
black   = "#2c3235"
red     = "#ff87a8"
green   = "#8acfd1"
yellow  = "#00ff00"
blue    = "#ff8a66"
magenta = "#ff0000"
cyan    = "#fcbf3b"
white   = "#0000ff"

[colors.bright]
black   = "#2c3235"
red     = "#ff87a8"
green   = "#8acfd1"
yellow  = "#00ff00"
blue    = "#ff8a66"
magenta = "#ff0000"
cyan    = "#fcbf3b"
white   = "#0000ff"

[colors.selection]
text       = "#000000"
background = "#E8B4B8"

[colors.search.matches]
foreground = "#FDFCF9"
background = "#D85A5A"

[colors.search.focused_match]
foreground = "#000000"
background = "#FF8A95"

[colors.cursor]
text   = "#000000"
cursor = "#FF8A95"

[colors.line_indicator]
background = "#FFE6E8"

[cursor]
style.shape = "Underline"
style.blinking = "Off"
thickness = 0.2
